name: docker

on:
  push:
  release:
    types: [created]

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: 🏷️ Set VERSION
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            RAW="${{ github.ref_name }}"

            VERSION=$(echo "$RAW" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/[^a-z0-9._-]+/-/g' \
              | sed -E 's/-+/-/g' \
              | sed -E 's/^[.-]+|[.-]+$//g')

            VERSION="rolling-$VERSION"
          fi

          # Enforce max length (128 chars for Docker tags)
          VERSION=$(echo "$VERSION" | cut -c1-128)

          # Fallback if somehow empty (edge-case paranoia)
          if [ -z "$VERSION" ]; then
            VERSION="rolling-unknown"
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Using VERSION=$VERSION"

      - name: 📩 Checkout code
        uses: actions/checkout@v3

      - name: 🔧 Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: 🔧 Set up Go 1.25
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: 🔧 Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🛂 Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: ⚙️ Compile the code
        run: mvn clean package

      - name: ⚙️ Build & Push image
        env:
          GH_REPO: ${{github.repository}}
          VERSION: ${{ env.VERSION }}
        run: docker buildx build --platform=linux/amd64,linux/arm64/v8 --tag ghcr.io/${GH_REPO,,}:${VERSION} --push .
